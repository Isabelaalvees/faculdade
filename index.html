<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WanderEats</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<header>
  <div class="header-container">

    <div class="logo">
      <img src="https://i.imgur.com/bsnaHcv.png" alt="Logo WanderEats">
      WanderEats
    </div>

    <nav class="menu">
      <a href="#" onclick="event.preventDefault(); carregarPagina('pais')">País</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('continente')">Continente</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('cultura')">Cultura</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('receita')">Receitas</a>
    </nav>

  </div>
</header>

<!-- HERO / BUSCA -->
<section class="hero">
  <div class="hero-conteudo">
    <h1 id="titulo">Para onde deseja viajar?</h1>

    <input 
      id="busca" 
      type="text"
      placeholder="Digite um país..."
      onkeypress="if(event.key === 'Enter') buscar()"
      oninput="verificarBusca()"
    >

    <button class="botao" onclick="buscar()">Pesquisar</button>
  </div>
</section>

<!-- CONTEÚDO DINÂMICO (PÁGINAS) -->
<main id="conteudo"></main>

<!-- BOTÃO VOLTAR AO TOPO -->
<button id="btnTopo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
  ↑
</button>

<footer>
  🍴 WanderEats — UNIP
</footer>

<script src="script.js"></script>

</body>
</html>
