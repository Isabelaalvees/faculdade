<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WanderEats</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<header>
  <div class="header-container">
    <div class="logo">
      <img src="imagens/logo.png" alt="WanderEats"> WanderEats
    </div>
    <nav class="menu">
      <a href="#" onclick="event.preventDefault(); carregarPagina('pais')">País</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('continente')">Continente</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('cultura')">Cultura</a>
      <a href="#" onclick="event.preventDefault(); carregarPagina('receita')">Receitas</a>
    <div class="bandeiras">
      <img src="https://flagcdn.com/w40/br.png" onclick="mudarIdioma('pt')">
      <img src="https://flagcdn.com/w40/us.png" onclick="mudarIdioma('en')">
      <img src="https://flagcdn.com/w40/es.png" onclick="mudarIdioma('es')">
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-conteudo">
    <h1 id="titulo">Para onde deseja viajar?</h1>
    <input id="busca" type="text" placeholder="Digite um país"
           onkeypress="if(event.key === 'Enter') buscar()"
           oninput="verificarBusca()">
    <button id="botaoBusca" class="botao" onclick="buscar()">Pesquisar</button>
    <div id="resultado-busca" style="font-size: 40px; min-height: 50px;"></div>
  </div>
</section>

<!-- DESTINOS POPULARES -->
<section id="secao-destinos" class="container destinos">
  <h2>Destinos Populares</h2>
  <div id="conteudo-pais"></div>
</section>

<!-- CONTINENTES -->
<section id="secao-continentes" class="container destinos">
  <h2>Destinos por Continente</h2>
  <div id="conteudo-continentes"></div>
</section>

<!-- CULTURAS -->
<section id="secao-culturas" class="container destinos">
  <h2>Conheça as Culturas</h2>
  <div id="conteudo-culturas"></div>
</section>

<!-- RECEITAS -->
<section id="secao-receita" class="container destinos">
  <h2>Experimente</h2>
  <div id="conteudo-receita"></div>
</section>

<footer>
  🍴 WanderEats — UNIP - Ciências da Computação
</footer>

<button id="btnTopo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⌂</button>

<script src="script.js"></script>
</body>
</html>
